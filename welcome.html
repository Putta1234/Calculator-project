<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Welcome</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

height:100vh;
overflow:hidden;
background-size:cover;
background-position:center;
background-repeat:no-repeat;
transition:background-image 1s ease-in-out;

}

/* Welcome Message */

#welcomeMessage{

position:absolute;

top:30px;

left:50%;

transform:translateX(-50%);

text-align:center;

color:white;

background:rgba(0,0,0,.5);

padding:20px 40px;

border-radius:12px;

}

#welcomeMessage h1{

font-size:45px;

}

#welcomeMessage h2{

margin-top:10px;

font-size:28px;

}

/* Calculator Button */

#openBtn{

display:none;

position:absolute;

bottom:40px;

left:50%;

transform:translateX(-50%);

padding:15px 40px;

font-size:22px;

background:#ff9800;

color:white;

border:none;

border-radius:10px;

cursor:pointer;

}

#openBtn:hover{

background:#e68900;

}

/* Calculator */

#calculator{

display:none;

position:absolute;

top:50%;

left:50%;

transform:translate(-50%,-50%);

background:#1f1f1f;

padding:20px;

border-radius:15px;

box-shadow:0 0 20px black;

width:330px;

}

#display{

width:100%;

height:60px;

font-size:25px;

text-align:right;

padding:10px;

margin-bottom:15px;

border:none;

border-radius:8px;

}

.buttons{

display:grid;

grid-template-columns:repeat(4,1fr);

gap:10px;

}

.buttons button{

height:60px;

font-size:22px;

border:none;

border-radius:10px;

background:#444;

color:white;

cursor:pointer;

}

.buttons button:hover{

background:#666;

}

.equal{

background:orange;

}

.clear{

background:red;

}

</style>

</head>

<body>

<img id="bg1" class="bg active"
src="https://images.unsplash.com/photo-1517649763962-0c623066013b?w=1920"
alt="Background 1">

<img id="bg2" class="bg"
src="https://images.unsplash.com/photo-1547347298-4074fc3086f0?w=1920"
alt="Background 2">
<div id="welcomeMessage">

<h1>Welcome</h1>

<h2>🎉 Successfully Logged In 🎉</h2>

</div>

<button id="openBtn" onclick="openCalculator()">
Use Calculator
</button>

<div id="calculator">

<input type="text" id="display" readonly>

<div class="buttons">

<button onclick="clearDisplay()" class="clear">C</button>

<button onclick="append('/')">/</button>

<button onclick="append('*')">*</button>

<button onclick="del()">⌫</button>

<button onclick="append('7')">7</button>

<button onclick="append('8')">8</button>

<button onclick="append('9')">9</button>

<button onclick="append('-')">-</button>

<button onclick="append('4')">4</button>

<button onclick="append('5')">5</button>

<button onclick="append('6')">6</button>

<button onclick="append('+')">+</button>

<button onclick="append('1')">1</button>

<button onclick="append('2')">2</button>

<button onclick="append('3')">3</button>

<button onclick="calculate()" class="equal">=</button>

<button onclick="append('0')">0</button>

<button onclick="append('.')">.</button>

</div>

</div>

<script>

// Background Images

const images = [
"https://upload.wikimedia.org/wikipedia/commons/7/7a/MS_Dhoni_in_July_2011.jpg",
"https://upload.wikimedia.org/wikipedia/commons/6/6d/Virat_Kohli.jpg"
];

let index = 0;

document.body.style.backgroundImage = `url('${images[index]}')`;

setInterval(() => {
    index = (index + 1) % images.length;
    document.body.style.backgroundImage = `url('${images[index]}')`;
}, 2000);

// Hide Welcome Message After 4 Seconds

setTimeout(function(){

document.getElementById("welcomeMessage").style.display="none";

document.getElementById("openBtn").style.display="block";

},4000);


// Open Calculator

function openCalculator(){

document.getElementById("calculator").style.display="block";

document.getElementById("openBtn").style.display="none";

}


// Calculator Functions

function append(value){

document.getElementById("display").value+=value;

}

function clearDisplay(){

document.getElementById("display").value="";

}

function del(){

let display=document.getElementById("display");

display.value=display.value.slice(0,-1);

}

function calculate(){

try{

document.getElementById("display").value=eval(document.getElementById("display").value);

}

catch{

alert("Invalid Expression");

}

}

</script>

</body>

</html>
